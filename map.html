<style>
  html, body { height: 100%; }
  body { background: #0F1014; }
  .map-shell {
    display: grid;
    grid-template-columns: 280px 1fr 380px;
    height: calc(100vh - 64px);
  }
  .map-canvas { position: relative; background:#1A1B21; }
  #leaflet-map { position:absolute; inset:0; }

  /* Override Leaflet defaults for darker look */
  .leaflet-container { background: #0F1014; font-family: var(--ic-font); }
  .leaflet-control-attribution { background: rgba(20,22,28,.7) !important; color: rgba(255,255,255,.5) !important; font-size: 9px !important; }
  .leaflet-control-attribution a { color: rgba(255,255,255,.7) !important; }
  .leaflet-control-zoom a {
    background: rgba(20,22,28,.85) !important; color: #fff !important;
    border-color: rgba(255,255,255,.15) !important;
  }
  .leaflet-control-zoom a:hover { background: rgba(40,41,48,.95) !important; }

  /* Layer panel (left) */
  .layer-panel {
    background: #15161A; color: #fff;
    border-right: 1px solid rgba(255,255,255,.08);
    overflow-y: auto; padding: 24px 22px;
  }
  .layer-panel h3 { font-size:13px; font-weight:600; margin:0 0 4px; }
  .layer-row {
    display: flex; gap: 14px; align-items: flex-start;
    padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,.06);
    cursor: default;
  }
  .layer-row:last-of-type { border-bottom: 0; }
  .layer-swatch {
    width: 32px; height: 32px; border-radius: 6px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.08);
    margin-top: 2px;
  }
  .layer-info { flex: 1; }
  .layer-info .name { font-size: 13.5px; font-weight: 500; }
  .layer-info .desc { font-size: 11.5px; color: rgba(255,255,255,.5); margin-top: 3px; line-height:1.4; }
  .layer-info .ai-tag {
    display: inline-flex; align-items: center; gap: 4px;
    margin-top: 6px;
    font-family: var(--ic-mono); font-size: 9.5px; letter-spacing: .14em;
    text-transform: uppercase; color: var(--ic-gold);
  }
  .layer-info .ai-tag::before { content: ""; width: 5px; height: 5px; border-radius: 50%; background: var(--ic-gold); }
  .switch {
    width: 32px; height: 18px; border-radius: 999px;
    background: rgba(255,255,255,.12); position: relative; flex-shrink: 0;
    transition: background .15s; margin-top: 6px;
  }
  .switch.on { background: var(--ic-burgundy-soft); }
  .switch::after {
    content: ""; position: absolute; top: 2px; left: 2px;
    width: 14px; height: 14px; border-radius: 50%; background: #fff;
    transition: transform .15s;
  }
  .switch.on::after { transform: translateX(14px); }

  /* Detail panel (right) */
  .detail-panel {
    background: var(--ic-card);
    border-left: 1px solid var(--ic-line);
    overflow-y: auto;
  }

  /* Floating map UI */
  .map-ui-top {
    position: absolute; top: 16px; left: 16px; right: 16px; z-index: 500;
    display: flex; gap: 12px; align-items: center; pointer-events: none;
  }
  .map-ui-top > * { pointer-events: auto; }
  .map-search {
    flex: 1; max-width: 480px;
    background: rgba(20,22,28,.85); backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 10px; padding: 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .map-search input {
    flex: 1; background: transparent; border: 0; outline: 0;
    padding: 8px 10px; color: #fff; font: inherit; font-size: 13.5px;
  }
  .map-search input::placeholder { color: rgba(255,255,255,.4); }

  /* Legend */
  .legend {
    position: absolute; bottom: 16px; left: 16px; z-index: 500;
    background: rgba(20,22,28,.85); backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 10px; padding: 14px 16px;
    color: #fff; max-width: 280px;
  }
  .legend h5 { margin:0 0 10px; font-size: 11px; font-family: var(--ic-mono); letter-spacing:.14em; text-transform: uppercase; color: rgba(255,255,255,.6); font-weight: 500; }
  .legend-grad { display: flex; height: 8px; border-radius: 4px; overflow: hidden; margin-bottom: 6px; }
  .legend-labels { display: flex; justify-content: space-between; font-size: 11px; color: rgba(255,255,255,.7); font-family: var(--ic-mono); }

  /* Zone marker (pulsing for AI) */
  .ai-marker {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--ic-gold);
    border: 3px solid #fff;
    box-shadow: 0 0 0 4px rgba(201,168,76,.25), 0 4px 12px rgba(0,0,0,.4);
    animation: pulse-gold 2.4s ease-in-out infinite;
  }
  @keyframes pulse-gold {
    0%, 100% { box-shadow: 0 0 0 4px rgba(201,168,76,.25), 0 4px 12px rgba(0,0,0,.4); }
    50% { box-shadow: 0 0 0 14px rgba(201,168,76,.05), 0 4px 12px rgba(0,0,0,.4); }
  }
  .prop-marker {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--ic-burgundy);
    border: 3px solid #fff;
    box-shadow: 0 4px 10px rgba(0,0,0,.35);
  }
  .prop-marker.gold { background: var(--ic-gold); }

  /* Mini chart */
  .mini-bar {
    display: flex; align-items: flex-end; gap: 4px; height: 60px;
  }
  .mini-bar > div { flex: 1; background: var(--ic-burgundy); border-radius: 2px 2px 0 0; opacity: .85; }
  .mini-bar > div.peak { background: var(--ic-gold); }

  /* Tabs */
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--ic-line); }
  .tabs button {
    flex: 1; padding: 14px 0; background: transparent; border: 0;
    font-size: 13px; font-weight: 500; color: var(--ic-text-2);
    border-bottom: 2px solid transparent;
    transition: all .15s;
  }
  .tabs button.active { color: var(--ic-burgundy); border-bottom-color: var(--ic-burgundy); }

  /* AI insight pill */
  .ai-insight {
    background: linear-gradient(180deg, #15161A 0%, #1C1D23 100%);
    color: #fff; border-radius: 12px;
    padding: 14px 16px; margin: 16px 24px;
    position: relative; overflow: hidden;
    border: 1px solid rgba(201,168,76,.18);
  }
  .ai-insight::before {
    content: ""; position: absolute; top: -50px; right: -50px;
    width: 150px; height: 150px;
    background: radial-gradient(closest-side, rgba(201,168,76,.18), transparent 70%);
  }

  /* Custom marker via div */
  .ic-div-marker {
    background: transparent !important;
    border: 0 !important;
  }
  .leaflet-popup-content-wrapper {
    background: var(--ic-ink) !important; color: #fff !important;
    border-radius: 10px !important;
    box-shadow: 0 16px 32px rgba(0,0,0,.4) !important;
    padding: 0 !important;
  }
  .leaflet-popup-content { margin: 12px 14px !important; font-family: var(--ic-font) !important; }
  .leaflet-popup-tip { background: var(--ic-ink) !important; }
  .leaflet-popup-close-button { color: rgba(255,255,255,.5) !important; }
</style>

function gradColor(v) {
  // value-based gradient for layer 1: 0=210, 1=540
  const t = (v - 200) / 360;
  // burgundy soft -> burgundy deep
  const a = { r:0xF7, g:0xEB, b:0xED };
  const b = { r:0x6B, g:0x0F, b:0x1A };
  const r = Math.round(a.r + (b.r-a.r)*t);
  const g = Math.round(a.g + (b.g-a.g)*t);
  const bl= Math.round(a.b + (b.b-a.b)*t);
  return `rgb(${r},${g},${bl})`;
}
function futureColor(v) {
  // 0..30 → soft gold to deep gold
  const t = Math.min(1, v / 30);
  const a = { r:0xFA, g:0xF4, b:0xE1 };
  const b = { r:0xC9, g:0xA8, b:0x4C };
  const r = Math.round(a.r + (b.r-a.r)*t);
  const g = Math.round(a.g + (b.g-a.g)*t);
  const bl= Math.round(a.b + (b.b-a.b)*t);
  return `rgb(${r},${g},${bl})`;
}

/* ─── Map ─── */
function LeafletMap({ enabled, selectedZone, onZoneSelect }) {
  const mapRef = useRef(null);
  const containerRef = useRef(null);
  const layerRefs = useRef({});

  useEffect(() => {
    if (mapRef.current) return;
    const map = L.map(containerRef.current, {
      center: [-38.735, -62.290],
      zoom: 12,
      zoomControl: true,
      attributionControl: true,
    });
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
      maxZoom: 19,
      attribution: '© OpenStreetMap, © CARTO',
    }).addTo(map);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png', {
      maxZoom: 19, pane: 'shadowPane'
    }).addTo(map);
    mapRef.current = map;
  }, []);

  // re-render zone polygons
  useEffect(() => {
    const map = mapRef.current;
    if (!map) return;

    Object.values(layerRefs.current).forEach(layer => { if (layer) map.removeLayer(layer); });
    layerRefs.current = {};

    // Layer 1: Valor actual
    if (enabled.value) {
      const grp = L.layerGroup();
      MAP_ZONES.forEach(z => {
        const poly = L.polygon(z.polygon, {
          color: gradColor(z.avgPrice), weight: 1, opacity: .8,
          fillColor: gradColor(z.avgPrice), fillOpacity: .55,
        }).bindTooltip(`<b>${z.name}</b><br/>USD ${z.avgPrice}/m²`, {className:'leaflet-tooltip-ic'});
        poly.on('click', () => onZoneSelect(z));
        grp.addLayer(poly);
      });
      grp.addTo(map);
      layerRefs.current.value = grp;
    }
    // Layer 2: Valor futuro
    if (enabled.future) {
      const grp = L.layerGroup();
      MAP_ZONES.forEach(z => {
        const poly = L.polygon(z.polygon, {
          color: futureColor(z.proj36m), weight: 2, opacity: .9,
          fillColor: futureColor(z.proj36m), fillOpacity: .35,
          dashArray: '4,4',
        }).bindTooltip(`<b>${z.name}</b><br/>+${z.proj36m.toFixed(1)}% (36m)`);
        poly.on('click', () => onZoneSelect(z));
        grp.addLayer(poly);
      });
      grp.addTo(map);
      layerRefs.current.future = grp;
    }
    // Layer 3: Especialización
    if (enabled.spec) {
      const grp = L.layerGroup();
      MAP_ZONES.forEach(z => {
        const c = SPEC_COLORS[z.specialty];
        const poly = L.polygon(z.polygon, {
          color: c, weight: 1.5, opacity: .9,
          fillColor: c, fillOpacity: .25,
        }).bindTooltip(`<b>${z.name}</b><br/>${z.specialty}`);
        poly.on('click', () => onZoneSelect(z));
        grp.addLayer(poly);
      });
      grp.addTo(map);
      layerRefs.current.spec = grp;
    }
    // Layer 4: AI opportunities — animated markers
    if (enabled.ai) {
      const grp = L.layerGroup();
      MAP_ZONES.filter(z => z.aiOpp).forEach(z => {
        const icon = L.divIcon({
          html: '<div class="ai-marker"></div>',
          className: 'ic-div-marker',
          iconSize: [28,28], iconAnchor: [14,14],
        });
        const m = L.marker(z.center, { icon }).bindPopup(`
          <div style="font-size:11px;font-family:'Geist Mono';color:#C9A84C;letter-spacing:.14em;text-transform:uppercase;">Oportunidad IA</div>
          <b style="display:block;margin:6px 0 2px;font-size:15px;">${z.name}</b>
          <div style="font-size:12px;color:rgba(255,255,255,.7);margin-bottom:8px">${z.subtitle}</div>
          <div style="font-size:12px;color:rgba(255,255,255,.85);">Subvaluada vs comparables · Proyección +${z.proj36m.toFixed(1)}% a 36m</div>
        `);
        m.on('click', () => onZoneSelect(z));
        grp.addLayer(m);
      });
      grp.addTo(map);
      layerRefs.current.ai = grp;
    }
    // Layer 5: Property pins
    if (enabled.props) {
      const grp = L.layerGroup();
      MAP_PROPS.forEach(p => {
        const icon = L.divIcon({
          html: `<div class="prop-marker ${p.gold?'gold':''}"></div>`,
          className: 'ic-div-marker',
          iconSize: [22,22], iconAnchor: [11,11],
        });
        L.marker(p.coord, { icon }).addTo(grp).bindPopup(`
          <b style="font-size:14px;">${p.type}</b>
          <div style="font-size:12px;color:rgba(255,255,255,.6);margin:2px 0 8px;">${p.zone}</div>
          <div style="font-size:13px;font-weight:600;">${p.price}</div>
          <a href="property.html" style="color:#C9A84C;font-size:12px;display:block;margin-top:8px;">Ver detalle →</a>
        `);
      });
      grp.addTo(map);
      layerRefs.current.props = grp;
    }
  }, [enabled]);

  return <div ref={containerRef} id="leaflet-map"/>;
}
