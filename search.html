<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Buscar · INDCONNECT</title>
<link rel="stylesheet" href="styles.css"/>

<script>
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "burgundy": "#6B0F1A",
    "goldOn": true,
    "density": "regular",
    "heroVar": "split",
    "logoVar": 1
  }/*EDITMODE-END*/;
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  .search-bar {
    background: #fff; border: 1px solid var(--ic-line); border-radius: 12px;
    padding: 6px; display: flex; gap: 4px; align-items: center;
    box-shadow: 0 1px 0 rgba(20,22,28,.04);
  }
  .search-bar input {
    flex: 1; border: 0; outline: 0; background: transparent;
    padding: 12px 12px; font: inherit; font-size: 15px;
  }
  .search-bar .ai-icon {
    width: 36px; height: 36px; border-radius: 8px;
    background: linear-gradient(135deg, var(--ic-burgundy), #1C1D23);
    display: flex; align-items: center; justify-content: center; color: #fff;
    margin-left: 6px;
  }
  .layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 32px;
    padding: 32px 0 96px;
  }
  @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }

  .filter-card {
    background: #fff; border: 1px solid var(--ic-line); border-radius: 12px;
    padding: 22px; position: sticky; top: 84px;
    max-height: calc(100vh - 100px); overflow-y: auto;
  }
  .filter-group + .filter-group { margin-top: 22px; padding-top: 22px; border-top: 1px solid var(--ic-line); }
  .filter-group h4 { font-size: 11.5px; font-family: var(--ic-mono); letter-spacing: .14em; text-transform: uppercase; color: var(--ic-text-2); margin: 0 0 12px; font-weight: 500; }

  .check {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 0; font-size: 13.5px; color: var(--ic-text);
  }
  .check .box {
    width: 16px; height: 16px; border-radius: 4px;
    border: 1.5px solid var(--ic-line);
    display: flex; align-items: center; justify-content: center;
    margin-right: 10px;
  }
  .check.on .box { background: var(--ic-burgundy); border-color: var(--ic-burgundy); color: #fff; }

  .results-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
  }
  @media (max-width: 1100px) { .results-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 640px)  { .results-grid { grid-template-columns: 1fr; } }

  .range {
    width: 100%; appearance: none; height: 4px;
    background: var(--ic-line); border-radius: 2px; margin: 12px 0 4px;
  }
  .range::-webkit-slider-thumb {
    appearance: none; width: 14px; height: 14px; border-radius: 50%;
    background: var(--ic-burgundy);
  }
  .pill-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .pill {
    padding: 6px 10px; font-size: 12px; border-radius: 6px;
    border: 1px solid var(--ic-line); color: var(--ic-text);
    background: #fff;
  }
  .pill.on { background: var(--ic-burgundy-tint); border-color: var(--ic-burgundy); color: var(--ic-burgundy); }

  .chip-active {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 8px 4px 10px; font-size: 12px;
    background: var(--ic-burgundy-tint); color: var(--ic-burgundy);
    border-radius: 999px; border: 1px solid rgba(107,15,26,.18);
  }
  .chip-active .x {
    width: 14px; height: 14px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: var(--ic-burgundy);
  }

  .map-view {
    position: relative; aspect-ratio: 4/3; background:#1A1B21; border-radius: 12px; overflow: hidden;
  }
</style>
</head>
<body>
<div id="app"></div>

<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="tweaks.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { useState } = React;

const TYPES = ["Galpón","Nave Industrial","Terreno","Centro Logístico","Local Industrial"];
const ZONES_F = ["Puerto Ing. White","Parque Industrial","Polo Petroquímico","La Carrindanga","General Cerri","Cabildo"];
const MODES = ["Venta","Alquiler","Inversión en pozo","Fraccionada"];

function FilterGroup({ title, children }) {
  return <div className="filter-group"><h4>{title}</h4>{children}</div>;
}

function Check({ label, on, count, onClick }) {
  return (
    <div className={"check " + (on?"on":"")} onClick={onClick}>
      <span style={{display:'flex',alignItems:'center'}}>
        <span className="box">{on && <svg width="10" height="10" viewBox="0 0 12 12"><path d="M2 6L5 9L10 3" stroke="currentColor" strokeWidth="2" fill="none"/></svg>}</span>
        {label}
      </span>
      {count && <span style={{fontSize:11.5,color:'var(--ic-text-3)',fontFamily:'var(--ic-mono)'}}>{count}</span>}
    </div>
  );
}

function FilterSidebar({ filters, setFilters }) {
  const toggle = (group, val) => {
    const cur = filters[group] || [];
    setFilters({...filters, [group]: cur.includes(val) ? cur.filter(x=>x!==val) : [...cur, val]});
  };
  return (
    <aside className="filter-card">
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:18,alignItems:'baseline'}}>
        <h3 style={{margin:0,fontSize:15,fontWeight:600}}>Filtros</h3>
        <button className="ic-btn ic-btn-ghost ic-btn-sm" onClick={()=>setFilters({})}>Limpiar</button>
      </div>

      <FilterGroup title="Tipo de propiedad">
        {TYPES.map((t,i) => (
          <Check key={t} label={t} count={[428,312,567,84,196][i]}
            on={(filters.type||[]).includes(t)} onClick={()=>toggle('type', t)}/>
        ))}
      </FilterGroup>

      <FilterGroup title="Modalidad">
        <div className="pill-row">
          {MODES.map(m => (
            <button key={m} className={"pill " + ((filters.mode||[]).includes(m)?"on":"")} onClick={()=>toggle('mode',m)}>{m}</button>
          ))}
        </div>
      </FilterGroup>

      <FilterGroup title="Ubicación">
        {ZONES_F.map(z => (
          <Check key={z} label={z}
            on={(filters.zone||[]).includes(z)} onClick={()=>toggle('zone', z)}/>
        ))}
      </FilterGroup>

      <FilterGroup title="Precio (USD)">
        <div className="ic-num" style={{display:'flex',justifyContent:'space-between',fontSize:12,color:'var(--ic-text-2)'}}>
          <span>$0</span>
          <span>$5M+</span>
        </div>
        <input type="range" className="range"/>
        <div style={{display:'flex',gap:6,marginTop:8}}>
          <input className="ic-input ic-num" placeholder="Min" style={{padding:'6px 8px',fontSize:12}}/>
          <input className="ic-input ic-num" placeholder="Max" style={{padding:'6px 8px',fontSize:12}}/>
        </div>
      </FilterGroup>

      <FilterGroup title="Superficie (m²)">
        <input type="range" className="range"/>
        <div style={{display:'flex',gap:6,marginTop:8}}>
          <input className="ic-input ic-num" placeholder="Min" style={{padding:'6px 8px',fontSize:12}}/>
          <input className="ic-input ic-num" placeholder="Max" style={{padding:'6px 8px',fontSize:12}}/>
        </div>
      </FilterGroup>

      <FilterGroup title="Vendedor">
        <Check label="Verificado" on={filters.verified} onClick={()=>setFilters({...filters, verified: !filters.verified})}/>
        <Check label="Premium" on={filters.premium} onClick={()=>setFilters({...filters, premium: !filters.premium})}/>
        <Check label="Calificación ≥ 4.5★" on={filters.rated} onClick={()=>setFilters({...filters, rated: !filters.rated})}/>
      </FilterGroup>

      <FilterGroup title="Powered by IA">
        <Check label="Solo oportunidades IA" on={filters.aiOnly} onClick={()=>setFilters({...filters, aiOnly: !filters.aiOnly})}/>
        <Check label="Solo subvaluadas" on={filters.under} onClick={()=>setFilters({...filters, under: !filters.under})}/>
      </FilterGroup>
    </aside>
  );
}

function MapView() {
  return (
    <div className="map-view">
      <svg viewBox="0 0 400 300" preserveAspectRatio="none" style={{position:'absolute',inset:0,width:'100%',height:'100%'}}>
        <defs>
          <pattern id="grid-sr" width="20" height="20" patternUnits="userSpaceOnUse">
            <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255,255,255,.05)" strokeWidth="1"/>
          </pattern>
        </defs>
        <rect width="400" height="300" fill="url(#grid-sr)"/>
        <path d="M0,200 C100,180 180,210 280,190 C340,178 380,210 400,200 L400,300 L0,300 Z" fill="rgba(20,22,28,.6)"/>
        <path d="M0,200 C100,180 180,210 280,190 C340,178 380,210 400,200" stroke="rgba(255,255,255,.15)" fill="none"/>
        <text x="220" y="160" fill="rgba(255,255,255,.45)" fontSize="9" fontFamily="Geist Mono">PUERTO ING. WHITE</text>
        <text x="90" y="100" fill="rgba(255,255,255,.45)" fontSize="9" fontFamily="Geist Mono">PARQUE INDUSTRIAL</text>
      </svg>
      {[
        {t:'58%',l:'68%',gold:true},
        {t:'42%',l:'30%',gold:false},
        {t:'70%',l:'48%',gold:true},
        {t:'52%',l:'82%',gold:false},
        {t:'30%',l:'55%',gold:false},
        {t:'78%',l:'72%',gold:true},
      ].map((p,i)=>(
        <div key={i} style={{position:'absolute',top:p.t,left:p.l,transform:'translate(-50%,-50%)',width:14,height:14,borderRadius:'50%',background:p.gold?'var(--ic-gold)':'var(--ic-burgundy)',border:'2px solid #fff',boxShadow:'0 0 0 4px '+(p.gold?'rgba(201,168,76,.20)':'rgba(107,15,26,.30)')}}/>
      ))}
      <a href="map.html" style={{position:'absolute',bottom:12,right:12,padding:'8px 12px',background:'#fff',color:'var(--ic-ink)',borderRadius:6,fontSize:12,fontWeight:500}}>Abrir mapa completo →</a>
    </div>
  );
}

function SearchPage() {
  const [t] = useIndTweaks();
  const [view, setView] = useState("grid"); // grid | map
  const [sort, setSort] = useState("ia");
  const [filters, setFilters] = useState({ type:["Galpón"], zone:["Puerto Ing. White"] });
  const [q, setQ] = useState("galpón cerca del puerto con acceso para camiones");

  return (
    <div className="ic-page" data-screen-label="03 Búsqueda">
      <Header active="search" logoVariant={t.logoVar}/>

      <div style={{background:'#fff',borderBottom:'1px solid var(--ic-line)'}}>
        <div className="ic-wrap" style={{padding:'24px 32px 20px'}}>
          <div className="search-bar">
            <div className="ai-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 2L13.5 8.5L20 10L13.5 11.5L12 18L10.5 11.5L4 10L10.5 8.5L12 2Z" fill="currentColor"/></svg>
            </div>
            <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Describí lo que buscás..."/>
            <button className="ic-btn ic-btn-primary">Buscar</button>
          </div>

          <div style={{display:'flex',gap:6,marginTop:14,alignItems:'center',flexWrap:'wrap'}}>
            <span style={{fontSize:11,fontFamily:'var(--ic-mono)',letterSpacing:'.14em',textTransform:'uppercase',color:'var(--ic-text-2)',marginRight:4}}>
              IA interpretó:
            </span>
            <span className="chip-active">Galpón <span className="x">×</span></span>
            <span className="chip-active">Puerto Ing. White <span className="x">×</span></span>
            <span className="chip-active">Acceso camiones <span className="x">×</span></span>
            <span className="chip-active">≥ 1.000 m² <span className="x">×</span></span>
          </div>
        </div>
      </div>

      <div className="ic-wrap">
        <div className="layout">
          <FilterSidebar filters={filters} setFilters={setFilters}/>
          <main>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,flexWrap:'wrap',gap:12}}>
              <div>
                <h1 style={{fontSize:22,fontWeight:600,letterSpacing:'-.02em',margin:'0 0 4px'}}>
                  <span className="ic-num">147</span> propiedades
                </h1>
                <div style={{display:'flex',alignItems:'center',gap:8,fontSize:13,color:'var(--ic-text-2)'}}>
                  <AILabel>Ordenadas por relevancia IA</AILabel>
                </div>
              </div>
              <div style={{display:'flex',gap:8,alignItems:'center'}}>
                <select className="ic-select" style={{width:'auto',fontSize:13}} value={sort} onChange={e=>setSort(e.target.value)}>
                  <option value="ia">Relevancia IA</option>
                  <option value="price-asc">Precio: menor a mayor</option>
                  <option value="price-desc">Precio: mayor a menor</option>
                  <option value="m2">Precio USD/m²</option>
                  <option value="recent">Más recientes</option>
                  <option value="rating">Calificación vendedor</option>
                </select>
                <div style={{display:'flex',gap:0,border:'1px solid var(--ic-line)',borderRadius:8,padding:2}}>
                  <button className={"ic-btn ic-btn-sm " + (view==='grid'?'ic-btn-primary':'ic-btn-ghost')} onClick={()=>setView('grid')}>
                    Grid
                  </button>
                  <button className={"ic-btn ic-btn-sm " + (view==='map'?'ic-btn-primary':'ic-btn-ghost')} onClick={()=>setView('map')}>
                    Mapa
                  </button>
                </div>
              </div>
            </div>

            {/* IA insight banner */}
            <div className="ic-ai-surface" style={{padding:'20px 24px',marginBottom:20,display:'flex',gap:20,alignItems:'center'}}>
              <div style={{width:42,height:42,borderRadius:10,background:'rgba(201,168,76,.18)',color:'var(--ic-gold)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 2L13.5 8.5L20 10L13.5 11.5L12 18L10.5 11.5L4 10L10.5 8.5L12 2Z" fill="currentColor"/></svg>
              </div>
              <div style={{flex:1,position:'relative'}}>
                <div className="ic-mono" style={{color:'var(--ic-gold)',fontSize:10}}>ANÁLISIS DE LA BÚSQUEDA</div>
                <div style={{fontSize:14,lineHeight:1.5,marginTop:6,color:'#fff'}}>
                  Esta búsqueda apunta a una zona con proyección de <b>+22.4% a 36 meses</b>. 3 de los resultados están marcados como <b>subvaluados</b> según comparables del mercado.
                </div>
              </div>
              <a href="map.html" className="ic-btn ic-btn-sm" style={{background:'rgba(255,255,255,.1)',color:'#fff',border:'1px solid rgba(255,255,255,.18)'}}>
                Ver en mapa
              </a>
            </div>

            {view === "grid" ? (
              <div className="results-grid">
                {[...PROPS, ...PROPS.slice(0,4)].slice(0,8).map((p,i) => (
                  <PropertyCard key={p.id+'-'+i} p={p}/>
                ))}
              </div>
            ) : (
              <div style={{display:'grid',gridTemplateColumns:'1fr 380px',gap:20,minHeight:600}}>
                <MapView/>
                <div style={{display:'flex',flexDirection:'column',gap:12,maxHeight:600,overflowY:'auto'}}>
                  {PROPS.slice(0,4).map(p => <PropertyCard key={p.id} p={p}/>)}
                </div>
              </div>
            )}

            <div style={{marginTop:32,display:'flex',justifyContent:'center',gap:6}}>
              {[1,2,3,4,5,'…',18].map((n,i)=>(
                <button key={i} className={"ic-btn ic-btn-sm " + (n===1?'ic-btn-primary':'ic-btn-secondary')}>{n}</button>
              ))}
            </div>
          </main>
        </div>
      </div>

      <Footer/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<SearchPage/>);
window.addEventListener('load', () => mountTweaks({ showLogoVar:true, showHeroVar:false }));
</script>
</body>
</html>
