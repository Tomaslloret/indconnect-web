  }/*EDITMODE-END*/;

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  .gallery {
    display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 4px;
    height: 480px; border-radius: 14px; overflow: hidden;
    margin-top: 20px;
  }
  .gallery > div { position: relative; }
  .gallery > div:first-child { grid-row: span 2; }
  .gallery .more {
    position: absolute; bottom: 14px; right: 14px;
    padding: 8px 12px; background: rgba(20,22,28,.85); color: #fff;
    border-radius: 8px; font-size: 12.5px; backdrop-filter: blur(8px);
  }

  .detail-grid {
    display: grid; grid-template-columns: 1fr 380px;
    gap: 56px; padding: 40px 0 96px;
  }
  @media (max-width: 1000px) { .detail-grid { grid-template-columns: 1fr; } }

  .spec-table {
    display: grid; grid-template-columns: repeat(2, 1fr);
    border-top: 1px solid var(--ic-line);
  }
  .spec-table > div {
    padding: 18px 24px;
    border-bottom: 1px solid var(--ic-line);
    border-right: 1px solid var(--ic-line);
  }
  .spec-table > div:nth-child(2n) { border-right: 0; }
  .spec-table .k { font-family: var(--ic-mono); font-size: 10.5px; letter-spacing: .14em; text-transform: uppercase; color: var(--ic-text-2); }
  .spec-table .v { font-size: 16px; font-weight: 500; margin-top: 4px; }

  .ai-card {
    border-radius: 16px;
    background: linear-gradient(180deg, #15161A 0%, #1C1D23 100%);
    color: #fff; padding: 28px 30px;
    position: relative; overflow: hidden;
    margin: 32px 0;
  }
  .ai-card::before {
    content:""; position:absolute; top:-120px; right:-120px; width: 280px; height: 280px;
    background: radial-gradient(closest-side, rgba(201,168,76,.22), transparent 70%);
  }
  .ai-card .quote {
    font-size: 19px; line-height: 1.45; letter-spacing: -.015em;
    margin: 14px 0 24px; max-width: 700px; position: relative;
  }
  .ai-stats {
    display: grid; grid-template-columns: repeat(3,1fr);
    gap: 0; border-top: 1px solid rgba(255,255,255,.1);
    position: relative;
  }
  .ai-stats > div {
    padding: 18px 4px 0;
    border-right: 1px solid rgba(255,255,255,.1);
  }
  .ai-stats > div:last-child { border-right: 0; }
  .ai-stats .k { font-family: var(--ic-mono); font-size: 10.5px; letter-spacing: .14em; text-transform: uppercase; color: rgba(255,255,255,.55); }
  .ai-stats .v { font-size: 28px; font-weight: 600; letter-spacing: -.025em; margin-top: 6px; }

  /* Sticky aside card */
  .price-card {
    background: #fff; border: 1px solid var(--ic-line); border-radius: 14px;
    padding: 24px; position: sticky; top: 84px;
  }
  .seller-card {
    background: #fff; border: 1px solid var(--ic-line); border-radius: 14px;
    padding: 24px; margin-top: 16px;
  }
  .review {
    padding: 16px 0; border-bottom: 1px solid var(--ic-line);
  }
  .review:last-child { border-bottom: 0; }

  .mini-map {
    position: relative; aspect-ratio: 16/9; border-radius: 12px; overflow: hidden;
    background: #1A1B21; border: 1px solid var(--ic-line);
  }
  .layer-toggles {
    position: absolute; top: 12px; left: 12px;
    display: flex; flex-direction: column; gap: 4px; z-index: 2;
  }
  .layer-toggles button {
    padding: 6px 10px; font-size: 11px;
    background: rgba(20,22,28,.85); color: #fff;
    border: 1px solid rgba(255,255,255,.15); border-radius: 6px;
    backdrop-filter: blur(8px); text-align: left;
    display: flex; align-items: center; gap: 6px;
  }
  .layer-toggles button.on { background: var(--ic-burgundy); border-color: var(--ic-burgundy); }
  .layer-toggles button .dot { width: 6px; height: 6px; border-radius: 50%; }

  .similar-grid {
    display: grid; grid-template-columns: repeat(4,1fr); gap: 16px;
    margin-top: 24px;
  }
  @media (max-width: 1024px) { .similar-grid { grid-template-columns: repeat(2,1fr); } }
  @media (max-width: 540px)  { .similar-grid { grid-template-columns: 1fr; } }

  /* Thumb-strip on gallery */
  .thumb-strip {
    display: flex; gap: 6px; margin-top: 8px; overflow-x: auto;
  }
  .thumb-strip > div {
    width: 96px; height: 64px; flex-shrink: 0;
    border-radius: 6px; overflow: hidden; opacity: .7; cursor: default;
  }
  .thumb-strip > div.active { opacity: 1; outline: 2px solid var(--ic-burgundy); outline-offset: 2px; }

  .breadcrumb {
    display: flex; gap: 8px; align-items: center; font-size: 12.5px;
    color: var(--ic-text-2); margin-top: 24px;
  }
  .breadcrumb a:hover { color: var(--ic-burgundy); }
  .breadcrumb .sep { color: var(--ic-text-3); }
</style>
</head>

function MiniMap({ layers, setLayers }) {
  return (
    <div className="mini-map">
      <div className="layer-toggles">

          { id:"val", label:"Valor actual", c:"var(--ic-burgundy)" },
          { id:"fut", label:"Valor futuro", c:"var(--ic-gold)" },
          { id:"opp", label:"Oportunidades IA", c:"var(--ic-gold)" },
        ].map(L => (
          <button key={L.id} className={layers[L.id]?"on":""} onClick={()=>setLayers({...layers,[L.id]:!layers[L.id]})}>
            <span className="dot" style={{background:L.c}}/>{L.label}
          </button>
        ))}
      </div>
      <svg viewBox="0 0 400 225" preserveAspectRatio="none" style={{position:'absolute',inset:0,width:'100%',height:'100%'}}>
        <defs>
          <pattern id="grid-mm" width="20" height="20" patternUnits="userSpaceOnUse">
            <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255,255,255,.05)" strokeWidth="1"/>
          </pattern>
        </defs>
        <rect width="400" height="225" fill="url(#grid-mm)"/>
        {layers.val && <polygon points="200,80 320,75 330,150 215,165" fill="rgba(107,15,26,.50)" stroke="rgba(107,15,26,.7)"/>}
        {layers.fut && <polygon points="200,80 320,75 330,150 215,165" fill="none" stroke="rgba(201,168,76,.9)" strokeWidth="1.5" strokeDasharray="4,4"/>}
        <path d="M0,180 C100,170 180,200 280,180 C340,168 380,200 400,190 L400,225 L0,225 Z" fill="rgba(20,22,28,.55)"/>
        <path d="M0,180 C100,170 180,200 280,180 C340,168 380,200 400,190" stroke="rgba(255,255,255,.18)" fill="none"/>
        <text x="240" y="105" fill="rgba(255,255,255,.6)" fontSize="9" fontFamily="Geist Mono">PUERTO ING. WHITE</text>
        {layers.opp && <circle cx="270" cy="120" r="18" fill="rgba(201,168,76,.22)" stroke="rgba(201,168,76,.6)"/>}
      </svg>
      {/* property pin */}
      <div style={{position:'absolute',top:'53%',left:'68%',transform:'translate(-50%,-100%)',zIndex:2}}>

    </div>
  );
}
