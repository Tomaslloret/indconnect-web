<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Inversión fraccionada · INDCONNECT</title>
<link rel="stylesheet" href="styles.css"/>

<script>
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "burgundy": "#6B0F1A",
    "goldOn": true,
    "density": "regular",
    "heroVar": "split",
    "logoVar": 1
  }/*EDITMODE-END*/;
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  .invest-hero {
    background:
      radial-gradient(50% 80% at 100% 0%, rgba(201,168,76,.16), transparent 55%),
      linear-gradient(180deg, var(--ic-burgundy) 0%, var(--ic-burgundy-deep) 100%);
    color: #fff; padding: 64px 0 56px;
    position: relative; overflow: hidden;
  }
  .invest-hero .grid-bg {
    position:absolute;inset:0;pointer-events:none;
    background-image: linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px), linear-gradient(90deg, rgba(255,255,255,.04) 1px,transparent 1px);
    background-size: 64px 64px;
    mask-image: radial-gradient(80% 80% at 50% 30%, #000 30%, transparent 80%);
    -webkit-mask-image: radial-gradient(80% 80% at 50% 30%, #000 30%, transparent 80%);
  }

  .stat-row { display:grid;grid-template-columns:repeat(4,1fr);gap:0;margin-top:40px;border:1px solid rgba(255,255,255,.12);border-radius:12px;overflow:hidden;background:rgba(255,255,255,.04);backdrop-filter:blur(12px); }
  .stat-row > div { padding: 20px 24px; border-right:1px solid rgba(255,255,255,.1); }
  .stat-row > div:last-child { border-right: 0; }
  .stat-row .k { font-family:var(--ic-mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.55); }
  .stat-row .v { font-size:28px;font-weight:600;letter-spacing:-.025em;margin-top:6px; }
  @media (max-width: 720px) { .stat-row { grid-template-columns: repeat(2,1fr); } .stat-row > div { border-right:0; } }

  .project-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px;
    margin-top: 32px;
  }
  @media (max-width: 800px) { .project-grid { grid-template-columns: 1fr; } }

  .project-card {
    background:#fff; border: 1px solid var(--ic-line); border-radius: 16px; overflow: hidden;
    display: grid; grid-template-columns: 200px 1fr;
    transition: border-color .15s, transform .15s, box-shadow .15s;
  }
  .project-card:hover { border-color: #d0d2d9; transform: translateY(-2px); box-shadow: var(--ic-shadow); }
  .project-card .photo {
    aspect-ratio: auto;
    position: relative; min-height: 240px;
    background: repeating-linear-gradient(135deg, #E9EAEE 0 12px, #DFE0E5 12px 24px);
  }
  .project-card .photo::after {
    content: attr(data-label); position:absolute; inset:0;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--ic-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:rgba(20,22,28,.45);
    padding:0 12px;text-align:center;
  }
  .project-card .body { padding: 22px 24px; }

  .progress {
    height: 6px; background: var(--ic-line); border-radius: 3px;
    overflow: hidden; margin: 8px 0 6px;
  }
  .progress > div { height: 100%; background: linear-gradient(90deg, var(--ic-burgundy), var(--ic-burgundy-soft)); border-radius: 3px; }

  .detail-section { padding: 96px 0; }
  .detail-card {
    background:#fff;border:1px solid var(--ic-line);border-radius:16px;padding:36px;
  }

  .doc-row {
    display:flex;justify-content:space-between;align-items:center;
    padding: 14px 0; border-bottom: 1px solid var(--ic-line); font-size:14px;
  }
  .doc-row:last-child { border-bottom: 0; }
  .doc-row .icon {
    width: 36px; height: 36px; border-radius: 8px;
    background: var(--ic-bg-2); display:flex;align-items:center;justify-content:center;
    color: var(--ic-text);
  }

  /* roi chart */
  .roi-chart {
    width: 100%; height: 200px; position: relative;
    background: var(--ic-bg); border-radius: 12px;
    padding: 24px;
  }
  .roi-chart svg { width:100%;height:100%; }
</style>
</head>
<body>
<div id="app"></div>

<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="tweaks.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { useState } = React;

function StatusBadge({ s }) {
  const cfg = {
    "En construcción": { bg:'#FAF4E1', col:'#74540a', dot:'#C9A84C' },
    "Pre-venta":       { bg:'rgba(46,125,91,.10)', col:'#1f5e44', dot:'#2E7D5B' },
    "Operativo":       { bg:'var(--ic-burgundy-tint)', col:'var(--ic-burgundy)', dot:'var(--ic-burgundy)' },
  }[s] || { bg:'var(--ic-line)', col:'var(--ic-text)', dot:'#888' };
  return <span style={{display:'inline-flex',alignItems:'center',gap:6,padding:'4px 9px',borderRadius:999,background:cfg.bg,color:cfg.col,fontSize:11.5,fontWeight:500}}>
    <span style={{width:6,height:6,borderRadius:'50%',background:cfg.dot}}/>{s}
  </span>;
}

function ProjectCard({ p, onOpen }) {
  return (
    <div className="project-card" onClick={()=>onOpen(p)}>
      <div className="photo" data-label={p.photo}>
        <div style={{position:'absolute',top:12,left:12,zIndex:2}}>
          <StatusBadge s={p.status}/>
        </div>
      </div>
      <div className="body">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
          <div>
            <h3 style={{margin:'0 0 4px',fontSize:18,fontWeight:600,letterSpacing:'-.015em'}}>{p.name}</h3>
            <div style={{fontSize:12.5,color:'var(--ic-text-2)'}}>{p.location}</div>
          </div>
          <div style={{textAlign:'right'}}>
            <div className="ic-mono" style={{fontSize:10,color:'var(--ic-text-2)'}}>ROI EST. ANUAL</div>
            <div className="ic-num" style={{fontSize:22,fontWeight:600,letterSpacing:'-.02em',color:'var(--ic-gold)'}}>{p.roi}%</div>
          </div>
        </div>

        <div style={{display:'flex',justifyContent:'space-between',fontSize:12.5,color:'var(--ic-text-2)',marginTop:18}}>
          <span>USD <b className="ic-num" style={{color:'var(--ic-ink)'}}>{p.total}</b> total</span>
          <span><b className="ic-num" style={{color:'var(--ic-ink)'}}>{p.funded}%</b> financiado</span>
        </div>
        <div className="progress"><div style={{width:p.funded+'%'}}/></div>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:11.5,color:'var(--ic-text-3)',fontFamily:'var(--ic-mono)',letterSpacing:'.06em'}}>
          <span>DESDE USD {p.min}</span>
          <span>{p.term}</span>
        </div>

        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:16,paddingTop:16,borderTop:'1px solid var(--ic-line)'}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <Reputation rating={p.developerRep} count={p.developerOps} compact/>
            <VerifiedBadge/>
          </div>
          <button className="ic-btn ic-btn-primary ic-btn-sm">Quiero invertir →</button>
        </div>
      </div>
    </div>
  );
}

function ProjectDetail({ p, onClose }) {
  const [amount, setAmount] = useState(1000);
  const roi = (amount * (parseFloat(p.roi)/100)).toFixed(0);
  return (
    <div style={{position:'fixed',inset:0,background:'rgba(15,16,20,.6)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:24,overflow:'auto'}}
      onClick={onClose}>
      <div style={{background:'#fff',borderRadius:18,maxWidth:980,width:'100%',maxHeight:'92vh',overflow:'auto',position:'relative'}}
        onClick={e=>e.stopPropagation()}>
        <div className="ic-photo" data-label={p.photo} style={{height:280,borderRadius:'18px 18px 0 0'}}>
          <button onClick={onClose} style={{position:'absolute',top:16,right:16,width:36,height:36,borderRadius:'50%',background:'rgba(255,255,255,.95)',border:0,fontSize:18,zIndex:3}}>×</button>
          <div style={{position:'absolute',top:16,left:16,zIndex:3,display:'flex',gap:6}}>
            <StatusBadge s={p.status}/>
            <VerifiedBadge ai/>
          </div>
        </div>

        <div style={{padding:'32px 36px 40px'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:24,marginBottom:24}}>
            <div>
              <h2 style={{margin:'0 0 6px',fontSize:30,fontWeight:600,letterSpacing:'-.025em'}}>{p.name}</h2>
              <div style={{fontSize:14,color:'var(--ic-text-2)'}}>📍 {p.location}</div>
            </div>
            <div style={{textAlign:'right'}}>
              <div className="ic-mono" style={{fontSize:10,color:'var(--ic-text-2)'}}>ROI EST. ANUAL</div>
              <div className="ic-num" style={{fontSize:36,fontWeight:600,letterSpacing:'-.025em',color:'var(--ic-gold)'}}>{p.roi}%</div>
            </div>
          </div>

          <div className="ic-stat-grid">
            <div><div className="k">Monto total</div><div className="v ic-num">USD {p.total}</div></div>
            <div><div className="k">Mínimo</div><div className="v ic-num">USD {p.min}</div></div>
            <div><div className="k">Plazo</div><div className="v">{p.term}</div></div>
            <div><div className="k">Financiado</div><div className="v ic-num">{p.funded}%</div></div>
          </div>

          <div className="ic-ai-surface" style={{padding:'22px 26px',margin:'24px 0'}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
              <span style={{width:6,height:6,borderRadius:'50%',background:'var(--ic-gold)',boxShadow:'0 0 0 3px rgba(201,168,76,.25)'}}/>
              <span className="ic-mono" style={{color:'var(--ic-gold)',fontSize:10.5}}>ANÁLISIS IA · PROYECCIÓN DE RETORNO</span>
            </div>
            <p style={{fontSize:15,lineHeight:1.55,margin:0,position:'relative'}}>
              Proyectamos un retorno acumulado de <b style={{color:'var(--ic-gold)'}}>~{(parseFloat(p.roi)*3).toFixed(0)}% en 3 años</b>, con base en la demanda logística de la zona, comparables de centros operativos cercanos y la trayectoria del desarrollador (calificación {p.developerRep}/5).
            </p>
          </div>

          <div style={{display:'grid',gridTemplateColumns:'1.4fr 1fr',gap:32,marginTop:24}}>
            <div>
              <h3 style={{fontSize:16,fontWeight:600,marginBottom:16}}>Documentación del proyecto</h3>
              {[
                { name:"Plano arquitectónico", size:"4.2 MB · PDF" },
                { name:"Estudio de factibilidad técnica", size:"2.8 MB · PDF" },
                { name:"Habilitación municipal", size:"1.1 MB · PDF" },
                { name:"Contrato de fideicomiso", size:"3.4 MB · PDF" },
                { name:"Cronograma de obra", size:"680 KB · XLSX" },
              ].map((d,i)=>(
                <div key={i} className="doc-row">
                  <div style={{display:'flex',alignItems:'center',gap:12}}>
                    <div className="icon">
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="currentColor" strokeWidth="1.7"/><path d="M14 2v6h6" stroke="currentColor" strokeWidth="1.7"/></svg>
                    </div>
                    <div>
                      <div style={{fontWeight:500,fontSize:13.5}}>{d.name}</div>
                      <div style={{fontSize:11.5,color:'var(--ic-text-2)',fontFamily:'var(--ic-mono)'}}>{d.size}</div>
                    </div>
                  </div>
                  <a href="#" style={{fontSize:13,color:'var(--ic-burgundy)'}}>Descargar</a>
                </div>
              ))}

              <h3 style={{fontSize:16,fontWeight:600,marginBottom:16,marginTop:32}}>Desarrollador</h3>
              <div style={{display:'flex',gap:14,alignItems:'center',padding:'16px 18px',border:'1px solid var(--ic-line)',borderRadius:12}}>
                <div className="ic-avatar" style={{width:48,height:48,fontSize:16}}>LS</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:15}}>Logística Sur SRL</div>
                  <div style={{fontSize:12.5,color:'var(--ic-text-2)',marginTop:2}}>{p.developerOps} proyectos · {p.term} promedio · 100% entrega en plazo</div>
                  <div style={{display:'flex',gap:6,marginTop:8}}>
                    <Reputation rating={p.developerRep} count={p.developerOps} compact/>
                    <VerifiedBadge premium/>
                  </div>
                </div>
              </div>

              <h3 style={{fontSize:16,fontWeight:600,marginBottom:8,marginTop:32}}>Co-inversores</h3>
              <p style={{fontSize:13,color:'var(--ic-text-2)',marginBottom:14}}>147 inversores ya forman parte del proyecto (identidad anónima por privacidad).</p>
              <div style={{display:'flex',gap:-4,alignItems:'center'}}>
                {[1,2,3,4,5,6,7].map(i=>(
                  <div key={i} className="ic-avatar" style={{width:36,height:36,fontSize:11,marginLeft:i===1?0:-8,background:i%2?'var(--ic-burgundy-soft)':'var(--ic-burgundy)',border:'2px solid #fff'}}>
                    {String.fromCharCode(64+i)}{String.fromCharCode(70+i)}
                  </div>
                ))}
                <span style={{marginLeft:8,fontSize:13,color:'var(--ic-text-2)'}}>+140 más</span>
              </div>
            </div>

            <div>
              <div style={{position:'sticky',top:24,background:'var(--ic-bg-2)',border:'1px solid var(--ic-line)',borderRadius:14,padding:24}}>
                <div className="ic-mono" style={{fontSize:10,color:'var(--ic-text-2)',marginBottom:10}}>SIMULAR INVERSIÓN</div>
                <label className="ic-label">Monto (USD)</label>
                <input className="ic-input ic-num" type="number" value={amount} onChange={e=>setAmount(parseInt(e.target.value)||0)}/>

                <input type="range" min="500" max="50000" step="500" value={amount}
                  onChange={e=>setAmount(parseInt(e.target.value))}
                  style={{width:'100%',marginTop:14}}/>

                <div style={{display:'flex',gap:6,marginTop:8}}>
                  {[500,1000,5000,10000].map(v=>(
                    <button key={v} onClick={()=>setAmount(v)}
                      className="ic-btn ic-btn-sm"
                      style={{flex:1,padding:'6px 0',justifyContent:'center',
                        background: amount===v ? 'var(--ic-burgundy)' : '#fff',
                        color: amount===v ? '#fff' : 'var(--ic-text)',
                        borderColor: amount===v ? 'var(--ic-burgundy)' : 'var(--ic-line)'
                      }}>${v.toLocaleString()}</button>
                  ))}
                </div>

                <div style={{marginTop:22,padding:'14px 16px',background:'#fff',borderRadius:10}}>
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:8}}>
                    <span style={{color:'var(--ic-text-2)'}}>Retorno anual est.</span>
                    <span className="ic-num" style={{fontWeight:600,color:'var(--ic-gold)'}}>USD {roi}</span>
                  </div>
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:8}}>
                    <span style={{color:'var(--ic-text-2)'}}>Retorno a 3 años</span>
                    <span className="ic-num" style={{fontWeight:600}}>USD {(parseFloat(roi)*3).toFixed(0)}</span>
                  </div>
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:13,paddingTop:8,borderTop:'1px solid var(--ic-line)'}}>
                    <span style={{color:'var(--ic-text-2)'}}>Plazo</span>
                    <span style={{fontWeight:500}}>{p.term}</span>
                  </div>
                </div>

                <button className="ic-btn ic-btn-primary" style={{width:'100%',justifyContent:'center',marginTop:14,padding:14}}>
                  Invertir USD {amount.toLocaleString()}
                </button>
                <p style={{fontSize:11,color:'var(--ic-text-3)',margin:'10px 0 0',lineHeight:1.4,textAlign:'center'}}>
                  La inversión está sujeta a la documentación y al fideicomiso del proyecto. Ver términos.
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function InvestPage() {
  const [t] = useIndTweaks();
  const [open, setOpen] = useState(null);
  const [filter, setFilter] = useState("all");

  return (
    <div className="ic-page" data-screen-label="05 Inversión fraccionada">
      <Header active="invest" logoVariant={t.logoVar}/>

      <section className="invest-hero">
        <div className="grid-bg"/>
        <div className="ic-wrap" style={{position:'relative'}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:18,opacity:.85}}>
            <span style={{width:6,height:6,borderRadius:'50%',background:'var(--ic-gold)',boxShadow:'0 0 0 3px rgba(201,168,76,.25)'}}/>
            <span className="ic-mono" style={{color:'rgba(255,255,255,.75)',fontSize:11}}>Inversión fraccionada · BETA</span>
          </div>
          <h1 className="ic-h1" style={{maxWidth:880,fontSize:'clamp(40px, 5.2vw, 64px)'}}>
            Invertí en real estate industrial<br/>
            <span style={{color:'var(--ic-gold)'}}>desde USD 500</span>.
          </h1>
          <p style={{maxWidth:640,fontSize:17,lineHeight:1.5,marginTop:20,color:'rgba(255,255,255,.78)'}}>
            Co-invertí en galpones, naves y centros logísticos en construcción u operativos. Documentación abierta, retorno proyectado por IA, sin fricción.
          </p>

          <div className="stat-row">
            <div><div className="k">Proyectos activos</div><div className="v ic-num">14</div></div>
            <div><div className="k">USD invertido</div><div className="v ic-num">$28.4M</div></div>
            <div><div className="k">Inversores</div><div className="v ic-num">2.137</div></div>
            <div><div className="k">ROI promedio</div><div className="v ic-num" style={{color:'var(--ic-gold)'}}>14.3%</div></div>
          </div>
        </div>
      </section>

      <section style={{padding:'72px 0 96px'}}>
        <div className="ic-wrap">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginBottom:8,flexWrap:'wrap',gap:16}}>
            <div>
              <div className="ic-eyebrow" style={{marginBottom:10}}>Proyectos disponibles</div>
              <h2 className="ic-h2">Elegí en qué invertir.</h2>
            </div>
            <div style={{display:'flex',gap:8}}>
              {["all","construccion","preventa","operativo"].map(f => (
                <button key={f} className={"ic-btn ic-btn-sm " + (filter===f?"ic-btn-primary":"ic-btn-secondary")} onClick={()=>setFilter(f)}>
                  {f === "all" ? "Todos" : f === "construccion" ? "En construcción" : f === "preventa" ? "Pre-venta" : "Operativos"}
                </button>
              ))}
            </div>
          </div>

          <div className="project-grid">
            {INVEST_PROJECTS.map(p => <ProjectCard key={p.id} p={p} onOpen={setOpen}/>)}
          </div>
        </div>
      </section>

      {open && <ProjectDetail p={open} onClose={()=>setOpen(null)}/>}

      <Footer/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<InvestPage/>);
window.addEventListener('load', () => mountTweaks({ showLogoVar:true, showHeroVar:false }));
</script>
</body>
</html>
