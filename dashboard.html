<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Dashboard · INDCONNECT</title>
<link rel="stylesheet" href="styles.css"/>

<script>
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "burgundy": "#6B0F1A",
    "goldOn": true,
    "density": "regular",
    "heroVar": "split",
    "logoVar": 1
  }/*EDITMODE-END*/;
</script>

<script src="auth.js"></script>
<script src="db.js"></script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  .dash-shell {
    display: grid;
    grid-template-columns: 240px 1fr;
    min-height: calc(100vh - 64px);
  }
  @media (max-width: 900px) { .dash-shell { grid-template-columns: 1fr; } }

  .dash-side {
    background: #fff; border-right: 1px solid var(--ic-line);
    padding: 32px 18px;
  }
  .dash-side .user {
    padding: 12px 12px 20px; border-bottom: 1px solid var(--ic-line); margin-bottom: 18px;
  }
  .side-link {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px; border-radius: 7px;
    font-size: 13.5px; font-weight: 500; color: var(--ic-text);
    margin-bottom: 2px;
  }
  .side-link:hover { background: var(--ic-line-2); color: var(--ic-ink); }
  .side-link.active { background: var(--ic-burgundy-tint); color: var(--ic-burgundy); }
  .side-link .badge {
    margin-left: auto; font-size: 10.5px; font-family: var(--ic-mono);
    background: var(--ic-burgundy); color: #fff;
    padding: 1px 6px; border-radius: 999px;
  }

  .dash-main { padding: 32px 40px 64px; background: var(--ic-bg); }
  @media (max-width: 900px) { .dash-main { padding: 24px 20px; } }

  .stat-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 28px; }
  @media (max-width: 900px) { .stat-cards { grid-template-columns: repeat(2, 1fr); } }
  .stat-card {
    background: #fff; border: 1px solid var(--ic-line); border-radius: 12px;
    padding: 20px;
  }
  .stat-card .k { font-family: var(--ic-mono); font-size: 10.5px; letter-spacing: .14em; text-transform: uppercase; color: var(--ic-text-2); }
  .stat-card .v { font-size: 28px; font-weight: 600; letter-spacing: -.025em; margin-top: 8px; }
  .stat-card .delta {
    margin-top: 6px; font-size: 12px;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .stat-card .delta.up { color: var(--ic-success); }
  .stat-card .delta.down { color: var(--ic-danger); }

  .panel {
    background: #fff; border: 1px solid var(--ic-line); border-radius: 14px;
    margin-bottom: 24px;
  }
  .panel-hd {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 24px; border-bottom: 1px solid var(--ic-line);
  }
  .panel-hd h3 { margin: 0; font-size: 15px; font-weight: 600; }
  .panel-body { padding: 8px 24px 22px; }

  .alert-row {
    display: flex; gap: 14px; align-items: flex-start;
    padding: 14px 0;
    border-bottom: 1px solid var(--ic-line);
  }
  .alert-row:last-child { border-bottom: 0; }
  .alert-row .icon {
    width: 36px; height: 36px; border-radius: 8px; flex-shrink: 0;
    background: var(--ic-burgundy-tint); color: var(--ic-burgundy);
    display: flex; align-items: center; justify-content: center;
  }
  .alert-row.gold .icon { background: rgba(201,168,76,.16); color: #74540a; }

  .listing-row {
    display: grid;
    grid-template-columns: 80px 1.6fr 1fr 1fr 1fr auto;
    gap: 16px; align-items: center;
    padding: 14px 0;
    border-bottom: 1px solid var(--ic-line);
  }
  .listing-row:last-child { border-bottom: 0; }
  .listing-row .thumb {
    width: 80px; height: 60px; border-radius: 8px;
    background: repeating-linear-gradient(135deg, #E9EAEE 0 8px, #DFE0E5 8px 16px);
  }
  .listing-row .stat { font-size: 13px; }
  .listing-row .stat .v { font-weight: 600; font-size: 16px; }
  .listing-row .stat .k { color: var(--ic-text-2); font-size: 11px; font-family: var(--ic-mono); letter-spacing: .1em; text-transform: uppercase; }

  .invest-row {
    display: grid;
    grid-template-columns: 1.4fr repeat(4, 1fr) auto;
    gap: 16px; align-items: center;
    padding: 16px 0;
    border-bottom: 1px solid var(--ic-line);
  }
  .invest-row:last-child { border-bottom: 0; }

  .spark { width: 80px; height: 30px; }
  .progress-mini {
    height: 4px; background: var(--ic-line); border-radius: 2px;
    width: 80px; overflow: hidden; margin-top: 6px;
  }
  .progress-mini > div { height: 100%; background: var(--ic-burgundy); }

  .ai-banner {
    background: linear-gradient(180deg, #15161A 0%, #1C1D23 100%);
    color: #fff; border-radius: 14px; padding: 24px 28px;
    position: relative; overflow: hidden;
    display: flex; gap: 18px; align-items: center;
    margin-bottom: 24px;
  }
  .ai-banner::before {
    content:""; position:absolute; top:-80px; right:-80px;
    width: 240px; height: 240px;
    background: radial-gradient(closest-side, rgba(201,168,76,.22), transparent 70%);
  }

  .empty-cta {
    border: 1.5px dashed var(--ic-line);
    border-radius: 12px; padding: 20px 24px;
    display: flex; gap: 16px; align-items: center; justify-content: space-between;
  }
</style>
</head>
<body>
<div id="app"></div>

<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="tweaks.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect } = React;

const SIDE_NAV = [
  { id:'overview', label:'Resumen',            icon: 'M3 12l9-9 9 9M5 10v10h14V10' },
  { id:'pubs',     label:'Mis publicaciones',  icon:'M3 4h18v16H3zM3 8h18M8 4v16' },
  { id:'invest',   label:'Mis inversiones',    icon:'M3 17L9 11l4 4 8-8' },
  { id:'received', label:'Consultas recibidas',icon:'M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z' },
  { id:'sent',     label:'Consultas enviadas', icon:'M3 10h11M9 21V3m0 0L3 9m6-6l6 6' },
  { id:'saved',    label:'Guardadas',          icon:'M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z' },
];

function SparkLine({ vals, color }) {
  if (!vals || vals.length < 2) return null;
  const max = Math.max(...vals), min = Math.min(...vals);
  const range = max - min || 1;
  const pts = vals.map((v,i)=> {
    const x = (i / (vals.length-1)) * 80;
    const y = 30 - ((v-min)/range) * 26 - 2;
    return `${x},${y}`;
  }).join(' ');
  const lastY = 30 - ((vals[vals.length-1]-min)/range)*26 - 2;
  return (
    <svg className="spark" viewBox="0 0 80 30">
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5"/>
      <circle cx={80} cy={lastY} r="2.5" fill={color}/>
    </svg>
  );
}

function EmptyState({ msg, cta, href }) {
  return (
    <div style={{padding:'32px 24px',textAlign:'center',color:'var(--ic-text-2)'}}>
      <div style={{fontSize:14}}>{msg}</div>
      {cta && <a href={href} className="ic-btn ic-btn-primary ic-btn-sm" style={{marginTop:12,display:'inline-flex'}}>{cta}</a>}
    </div>
  );
}

function Dashboard() {
  const [t] = useIndTweaks();
  const [tab, setTab] = useState('overview');
  const [user, setUser] = useState(null);
  const [myProps, setMyProps]       = useState([]);
  const [investments, setInvestments] = useState([]);
  const [inquiriesIn, setInquiriesIn] = useState([]);
  const [inquiriesOut, setInquiriesOut] = useState([]);
  const [favorites, setFavorites]   = useState([]);

  useEffect(() => {
    IndAuth.requireAuth();
    const u = IndAuth.getCurrentUser();
    if (!u) return;
    setUser(u);
    try { setMyProps(IndDB.getUserProperties(u.id) || []); } catch(e){}
    try { setInvestments(IndDB.getUserInvestments(u.id) || []); } catch(e){}
    try { setInquiriesIn(IndDB.getInquiriesReceived(u.id) || []); } catch(e){}
    try { setInquiriesOut(IndDB.getInquiriesSent(u.id) || []); } catch(e){}
    try {
      const favIds = IndDB.getFavorites(u.id) || [];
      const favProps = favIds.map(id => { try { return IndDB.getProperty(id); } catch(e){ return null; } }).filter(Boolean);
      setFavorites(favProps);
    } catch(e){}
  }, []);

  const handleDelete = (propId) => {
    if (!user) return;
    if (!window.confirm('¿Eliminar esta propiedad?')) return;
    try {
      IndDB.deleteProperty(propId, user.id);
      setMyProps(prev => prev.filter(p => p.id !== propId));
    } catch(e) { alert('No se pudo eliminar.'); }
  };

  const handleLogout = () => { IndAuth.logout(); window.location.href = 'index.html'; };

  const initials = user ? (user.name || user.email).split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase() : '??';
  const totalViews = myProps.reduce((s,p) => s + (p.views||0), 0);
  const totalInquiries = inquiriesIn.length;
  const totalInvested = investments.reduce((s,inv) => s + (inv.amount||0), 0);

  const navCounts = {
    pubs: myProps.length,
    invest: investments.length,
    received: inquiriesIn.length,
    sent: inquiriesOut.length,
    saved: favorites.length,
  };

  return (
    <div className="ic-page" data-screen-label="06 Dashboard">
      <Header active="dash" logoVariant={t.logoVar}/>

      <div className="dash-shell">
        <aside className="dash-side">
          <div className="user">
            <div style={{display:'flex',gap:12,alignItems:'center'}}>
              <div className="ic-avatar">{initials}</div>
              <div>
                <div style={{fontWeight:600,fontSize:14}}>{user ? (user.name || user.email) : '...'}</div>
                <div style={{fontSize:11.5,color:'var(--ic-text-2)'}}>{user ? user.company || 'Usuario' : ''}</div>
              </div>
            </div>
          </div>

          {SIDE_NAV.map(n => (
            <a key={n.id} className={"side-link " + (tab===n.id?"active":"")} onClick={()=>setTab(n.id)} style={{cursor:'pointer'}}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <path d={n.icon} stroke="currentColor" strokeWidth="1.7" strokeLinejoin="round" strokeLinecap="round"/>
              </svg>
              {n.label}
              {navCounts[n.id] > 0 && <span className="badge">{navCounts[n.id]}</span>}
            </a>
          ))}

          <a className="ic-btn ic-btn-primary" href="publish.html" style={{justifyContent:'center',marginTop:20,width:'100%'}}>
            + Publicar propiedad
          </a>
          <button className="ic-btn ic-btn-ghost" style={{justifyContent:'center',marginTop:8,width:'100%'}} onClick={handleLogout}>
            Cerrar sesión
          </button>
        </aside>

        <main className="dash-main">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginBottom:24,flexWrap:'wrap',gap:12}}>
            <div>
              <div className="ic-eyebrow" style={{marginBottom:8}}>Resumen</div>
              <h1 style={{margin:0,fontSize:28,fontWeight:600,letterSpacing:'-.025em'}}>
                Hola, {user ? (user.name || '').split(' ')[0] || 'Usuario' : '...'}
              </h1>
            </div>
          </div>

          {/* ── OVERVIEW ── */}
          {tab === 'overview' && (
            <>
              <div className="stat-cards">
                <div className="stat-card">
                  <div className="k">Vistas (todas pubs)</div>
                  <div className="v ic-num">{totalViews.toLocaleString()}</div>
                </div>
                <div className="stat-card">
                  <div className="k">Consultas recibidas</div>
                  <div className="v ic-num">{totalInquiries}</div>
                </div>
                <div className="stat-card">
                  <div className="k">Invertido total</div>
                  <div className="v ic-num">USD {totalInvested.toLocaleString()}</div>
                </div>
                <div className="stat-card">
                  <div className="k">Publicaciones</div>
                  <div className="v ic-num">{myProps.length}</div>
                </div>
              </div>

              {/* Quick recent inquiries */}
              <div className="panel">
                <div className="panel-hd">
                  <h3>Consultas recientes</h3>
                  <button className="ic-btn ic-btn-ghost ic-btn-sm" onClick={()=>setTab('received')}>Ver todas →</button>
                </div>
                <div className="panel-body">
                  {inquiriesIn.length === 0
                    ? <EmptyState msg="No tenés consultas recibidas todavía."/>
                    : inquiriesIn.slice(0,4).map((m,i)=>(
                        <div key={i} className="alert-row">
                          <div className="ic-avatar" style={{width:36,height:36,fontSize:12}}>
                            {(m.fromName||'?').split(' ').map(w=>w[0]).slice(0,2).join('')}
                          </div>
                          <div style={{flex:1}}>
                            <div style={{fontSize:13.5,fontWeight:600}}>{m.fromName || m.fromEmail}</div>
                            <div style={{fontSize:11.5,color:'var(--ic-text-2)',fontFamily:'var(--ic-mono)',marginTop:1}}>{m.propTitle}</div>
                            <div style={{fontSize:13,color:'var(--ic-text)',marginTop:6,lineHeight:1.4}}>"{m.message}"</div>
                          </div>
                        </div>
                      ))
                  }
                </div>
              </div>

              <div style={{marginTop:24}}>
                <div className="empty-cta">
                  <div style={{flex:1}}>
                    <h4 style={{margin:0,fontSize:15,fontWeight:600}}>Verificación premium pendiente</h4>
                    <p style={{margin:'6px 0 0',fontSize:13,color:'var(--ic-text-2)'}}>Completá la verificación premium para obtener el badge ★ Premium.</p>
                  </div>
                  <button className="ic-btn ic-btn-gold">Empezar verificación →</button>
                </div>
              </div>
            </>
          )}

          {/* ── MIS PUBLICACIONES ── */}
          {tab === 'pubs' && (
            <div className="panel">
              <div className="panel-hd">
                <h3>Mis publicaciones ({myProps.length})</h3>
                <a href="publish.html" className="ic-btn ic-btn-primary ic-btn-sm">+ Nueva</a>
              </div>
              <div className="panel-body">
                {myProps.length === 0
                  ? <EmptyState msg="No tenés propiedades publicadas." cta="Publicar ahora" href="publish.html"/>
                  : myProps.map((p,i)=>(
                      <div key={p.id||i} className="listing-row">
                        <div className="thumb"/>
                        <div>
                          <div style={{fontWeight:600,fontSize:14,marginBottom:2}}>{p.title}</div>
                          <div style={{fontSize:12,color:'var(--ic-text-2)'}}>{p.zone || p.location} · {p.mode}</div>
                          {p.aiHighlight && <div style={{marginTop:6}}><AILabel>IA destaca</AILabel></div>}
                        </div>
                        <div className="stat"><div className="v ic-num">{p.views||0}</div><div className="k">VISTAS</div></div>
                        <div className="stat ic-num" style={{fontWeight:600,fontSize:15}}>
                          {p.price ? 'USD ' + p.price.toLocaleString() : '—'}
                        </div>
                        <div style={{display:'flex',gap:6}}>
                          <a href={'property.html?id='+p.id} className="ic-btn ic-btn-secondary ic-btn-sm">Ver</a>
                          <button className="ic-btn ic-btn-sm" style={{color:'var(--ic-danger)',borderColor:'var(--ic-danger)'}}
                            onClick={()=>handleDelete(p.id)}>Eliminar</button>
                        </div>
                      </div>
                    ))
                }
              </div>
            </div>
          )}

          {/* ── INVERSIONES ── */}
          {tab === 'invest' && (
            <div className="panel">
              <div className="panel-hd">
                <h3>Mis inversiones ({investments.length})</h3>
                <a href="invest.html" className="ic-btn ic-btn-ghost ic-btn-sm">Explorar proyectos →</a>
              </div>
              <div className="panel-body">
                {investments.length === 0
                  ? <EmptyState msg="No tenés inversiones todavía." cta="Explorar proyectos" href="invest.html"/>
                  : investments.map((inv,i)=>{
                      const proj = (() => { try { return IndDB.getInvestProject(inv.projectId); } catch(e){ return null; } })();
                      return (
                        <div key={inv.id||i} className="invest-row">
                          <div>
                            <div style={{fontWeight:600,fontSize:14}}>{proj ? proj.name : inv.projectId}</div>
                            <div style={{fontSize:11.5,color:'var(--ic-text-2)',marginTop:2}}>{proj ? proj.status : ''}</div>
                          </div>
                          <div className="stat"><div className="k">INVERTIDO</div><div className="v ic-num" style={{fontSize:15}}>USD {(inv.amount||0).toLocaleString()}</div></div>
                          <div className="stat"><div className="k">ROI EST.</div><div className="v ic-num" style={{fontSize:15,color:'var(--ic-gold)'}}>{proj ? proj.roi + '%' : '—'}</div></div>
                          <div className="stat"><div className="k">FINANCIADO</div>
                            <div>
                              <div className="v ic-num" style={{fontSize:15}}>{proj ? proj.funded + '%' : '—'}</div>
                              {proj && <div className="progress-mini"><div style={{width:proj.funded+'%'}}/></div>}
                            </div>
                          </div>
                          <a href="invest.html" className="ic-btn ic-btn-secondary ic-btn-sm">Ver</a>
                        </div>
                      );
                    })
                }
              </div>
            </div>
          )}

          {/* ── CONSULTAS RECIBIDAS ── */}
          {tab === 'received' && (
            <div className="panel">
              <div className="panel-hd">
                <h3>Consultas recibidas ({inquiriesIn.length})</h3>
              </div>
              <div className="panel-body">
                {inquiriesIn.length === 0
                  ? <EmptyState msg="No recibiste consultas todavía."/>
                  : inquiriesIn.map((m,i)=>(
                      <div key={i} className="alert-row">
                        <div className="ic-avatar" style={{width:36,height:36,fontSize:12}}>
                          {(m.fromName||'?').split(' ').map(w=>w[0]).slice(0,2).join('')}
                        </div>
                        <div style={{flex:1}}>
                          <div style={{fontSize:13.5,fontWeight:600}}>{m.fromName || m.fromEmail}</div>
                          <div style={{fontSize:11.5,color:'var(--ic-text-2)',fontFamily:'var(--ic-mono)',marginTop:1}}>{m.propTitle}</div>
                          <div style={{fontSize:13,color:'var(--ic-text)',marginTop:6,lineHeight:1.4}}>"{m.message}"</div>
                          {m.fromEmail && <div style={{fontSize:11.5,color:'var(--ic-text-3)',marginTop:4}}>{m.fromEmail}</div>}
                        </div>
                      </div>
                    ))
                }
              </div>
            </div>
          )}

          {/* ── CONSULTAS ENVIADAS ── */}
          {tab === 'sent' && (
            <div className="panel">
              <div className="panel-hd">
                <h3>Consultas enviadas ({inquiriesOut.length})</h3>
              </div>
              <div className="panel-body">
                {inquiriesOut.length === 0
                  ? <EmptyState msg="No enviaste consultas todavía." cta="Buscar propiedades" href="search.html"/>
                  : inquiriesOut.map((m,i)=>(
                      <div key={i} className="alert-row">
                        <div className="ic-avatar" style={{width:36,height:36,fontSize:12}}>
                          {(m.propTitle||'P').split(' ').map(w=>w[0]).slice(0,2).join('')}
                        </div>
                        <div style={{flex:1}}>
                          <div style={{fontSize:13.5,fontWeight:600}}>{m.propTitle}</div>
                          <div style={{fontSize:13,color:'var(--ic-text)',marginTop:6,lineHeight:1.4}}>"{m.message}"</div>
                          {m.propId && <a href={'property.html?id='+m.propId} style={{fontSize:12,color:'var(--ic-burgundy)',marginTop:4,display:'inline-block'}}>Ver propiedad →</a>}
                        </div>
                      </div>
                    ))
                }
              </div>
            </div>
          )}

          {/* ── GUARDADAS ── */}
          {tab === 'saved' && (
            <div className="panel">
              <div className="panel-hd">
                <h3>Propiedades guardadas ({favorites.length})</h3>
              </div>
              <div className="panel-body">
                {favorites.length === 0
                  ? <EmptyState msg="No guardaste propiedades todavía." cta="Buscar propiedades" href="search.html"/>
                  : <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))',gap:16,paddingTop:8}}>
                      {favorites.map(p => (
                        <a key={p.id} href={'property.html?id='+p.id} style={{textDecoration:'none'}}>
                          <PropertyCard p={p}/>
                        </a>
                      ))}
                    </div>
                }
              </div>
            </div>
          )}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<Dashboard/>);
window.addEventListener('load', () => mountTweaks({ showLogoVar:true, showHeroVar:false }));
</script>
</body>
</html>
