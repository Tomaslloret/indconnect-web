<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Dashboard · INDCONNECT</title>
<link rel="stylesheet" href="styles.css"/>

<script>
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "burgundy": "#6B0F1A",
    "goldOn": true,

    "logoVar": 1

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  .dash-shell {
    display: grid;
    grid-template-columns: 240px 1fr;
    min-height: calc(100vh - 64px);
  }
  @media (max-width: 900px) { .dash-shell { grid-template-columns: 1fr; } }

  .dash-side {
    background: #fff; border-right: 1px solid var(--ic-line);
    padding: 32px 18px;
  }
  .dash-side .user {
    padding: 12px 12px 20px; border-bottom: 1px solid var(--ic-line); margin-bottom: 18px;
  }
  .side-link {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px; border-radius: 7px;
    font-size: 13.5px; font-weight: 500; color: var(--ic-text);
    margin-bottom: 2px;
  }
  .side-link:hover { background: var(--ic-line-2); color: var(--ic-ink); }
  .side-link.active { background: var(--ic-burgundy-tint); color: var(--ic-burgundy); }
  .side-link .badge {
    margin-left: auto; font-size: 10.5px; font-family: var(--ic-mono);
    background: var(--ic-burgundy); color: #fff;
    padding: 1px 6px; border-radius: 999px;
  }

  .dash-main { padding: 32px 40px 64px; background: var(--ic-bg); }
  @media (max-width: 900px) { .dash-main { padding: 24px 20px; } }

  .stat-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 28px; }
  @media (max-width: 900px) { .stat-cards { grid-template-columns: repeat(2, 1fr); } }
  .stat-card {
    background: #fff; border: 1px solid var(--ic-line); border-radius: 12px;
    padding: 20px;
  }
  .stat-card .k { font-family: var(--ic-mono); font-size: 10.5px; letter-spacing: .14em; text-transform: uppercase; color: var(--ic-text-2); }
  .stat-card .v { font-size: 28px; font-weight: 600; letter-spacing: -.025em; margin-top: 8px; }
  .stat-card .delta {
    margin-top: 6px; font-size: 12px;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .stat-card .delta.up { color: var(--ic-success); }
  .stat-card .delta.down { color: var(--ic-danger); }

  .panel {
    background: #fff; border: 1px solid var(--ic-line); border-radius: 14px;
    margin-bottom: 24px;
  }
  .panel-hd {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 24px; border-bottom: 1px solid var(--ic-line);
  }
  .panel-hd h3 { margin: 0; font-size: 15px; font-weight: 600; }
  .panel-body { padding: 8px 24px 22px; }

  .alert-row {
    display: flex; gap: 14px; align-items: flex-start;
    padding: 14px 0;
    border-bottom: 1px solid var(--ic-line);
  }
  .alert-row:last-child { border-bottom: 0; }
  .alert-row .icon {
    width: 36px; height: 36px; border-radius: 8px; flex-shrink: 0;
    background: var(--ic-burgundy-tint); color: var(--ic-burgundy);
    display: flex; align-items: center; justify-content: center;
  }
  .alert-row.gold .icon { background: rgba(201,168,76,.16); color: #74540a; }

  .listing-row {
    display: grid;
    grid-template-columns: 80px 1.6fr 1fr 1fr 1fr auto;
    gap: 16px; align-items: center;
    padding: 14px 0;
    border-bottom: 1px solid var(--ic-line);
  }
  .listing-row:last-child { border-bottom: 0; }
  .listing-row .thumb {
    width: 80px; height: 60px; border-radius: 8px;
    background: repeating-linear-gradient(135deg, #E9EAEE 0 8px, #DFE0E5 8px 16px);
  }
  .listing-row .stat { font-size: 13px; }
  .listing-row .stat .v { font-weight: 600; font-size: 16px; }
  .listing-row .stat .k { color: var(--ic-text-2); font-size: 11px; font-family: var(--ic-mono); letter-spacing: .1em; text-transform: uppercase; }

  .invest-row {
    display: grid;
    grid-template-columns: 1.4fr repeat(4, 1fr) auto;
    gap: 16px; align-items: center;
    padding: 16px 0;
    border-bottom: 1px solid var(--ic-line);
  }
  .invest-row:last-child { border-bottom: 0; }

  .spark { width: 80px; height: 30px; }
  .progress-mini {
    height: 4px; background: var(--ic-line); border-radius: 2px;
    width: 80px; overflow: hidden; margin-top: 6px;
  }
  .progress-mini > div { height: 100%; background: var(--ic-burgundy); }

  .ai-banner {
    background: linear-gradient(180deg, #15161A 0%, #1C1D23 100%);
    color: #fff; border-radius: 14px; padding: 24px 28px;
    position: relative; overflow: hidden;
    display: flex; gap: 18px; align-items: center;
    margin-bottom: 24px;
  }
  .ai-banner::before {
    content:""; position:absolute; top:-80px; right:-80px;
    width: 240px; height: 240px;
    background: radial-gradient(closest-side, rgba(201,168,76,.22), transparent 70%);
  }

  .empty-cta {
    border: 1.5px dashed var(--ic-line);
    border-radius: 12px; padding: 20px 24px;
    display: flex; gap: 16px; align-items: center; justify-content: space-between;
  }
</style>
</head>
<body>
<div id="app"></div>

const { useState } = React;

const SIDE_NAV = [
  { id:'overview', label:'Resumen', icon: 'M3 12l9-9 9 9M5 10v10h14V10' },
  { id:'pubs',     label:'Mis publicaciones', count:5, icon:'M3 4h18v16H3zM3 8h18M8 4v16' },
  { id:'invest',   label:'Mis inversiones',  count:3, icon:'M3 17L9 11l4 4 8-8' },
  { id:'messages', label:'Consultas', count:12, icon:'M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z' },
  { id:'rep',      label:'Mi reputación', icon:'M12 2L14 8L20 10L14 12L12 18L10 12L4 10L10 8L12 2Z' },
  { id:'alerts',   label:'Alertas IA',     count:4, icon:'M12 2L13.5 8L20 9L15 13L16.5 20L12 16.5L7.5 20L9 13L4 9L10.5 8L12 2z' },
  { id:'saved',    label:'Guardadas', icon:'M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z' },
  { id:'settings', label:'Configuración', icon:'M12 15a3 3 0 100-6 3 3 0 000 6z' },
];

function SparkLine({ vals, color }) {
  const max = Math.max(...vals), min = Math.min(...vals);
  const pts = vals.map((v,i)=> {
    const x = (i / (vals.length-1)) * 80;
    const y = 30 - ((v-min)/(max-min)) * 26 - 2;
    return `${x},${y}`;
  }).join(' ');
  return (
    <svg className="spark" viewBox="0 0 80 30">
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5"/>
      <circle cx={80} cy={30 - ((vals[vals.length-1]-min)/(max-min))*26 - 2} r="2.5" fill={color}/>
    </svg>
  );
}

  const [t] = useIndTweaks();
  const [tab, setTab] = useState('overview');

          </a>
        </aside>

        <main className="dash-main">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginBottom:24,flexWrap:'wrap',gap:12}}>

            </div>
          </div>

          {/* AI banner */}
          <div className="ai-banner">
            <div style={{width:44,height:44,borderRadius:10,background:'rgba(201,168,76,.18)',color:'var(--ic-gold)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,position:'relative'}}>
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 2L13.5 8.5L20 10L13.5 11.5L12 18L10.5 11.5L4 10L10.5 8.5L12 2Z" fill="currentColor"/></svg>
            </div>
            <div style={{flex:1,position:'relative'}}>

          {/* Stat cards */}

              <div className="v ic-num">3.482</div>
              <div className="delta up">▲ 12.4% vs mes anterior</div>
            </div>
            <div className="stat-card">
              <div className="k">Consultas</div>
              <div className="v ic-num">47</div>
              <div className="delta up">▲ 8 nuevas hoy</div>
            </div>

              <div className="v ic-num">USD 14.500</div>

          {/* Mis publicaciones */}

              <h3>Mis publicaciones activas</h3>
              <div style={{display:'flex',gap:8}}>
                <button className="ic-btn ic-btn-ghost ic-btn-sm">Ver todas (5)</button>

            <div className="panel-body">

                  { who:"Logística Atlántica SA", prop:"Nave 3.200 m²", txt:"¿Tiene certificado de habilitación industrial?", time:"hace 1 día" },
                  { who:"Inv. del Sur", prop:"Galpón 1.800 m²", txt:"Listo, agendamos la visita para el viernes 17:00.", time:"hace 2 días" },

                  <div key={i} className="alert-row">
                    <div className="ic-avatar" style={{width:36,height:36,fontSize:12}}>{m.who.split(' ').map(w=>w[0]).slice(0,2).join('')}</div>
                    <div style={{flex:1}}>

                        <span style={{fontSize:13.5,fontWeight:600}}>{m.who}</span>
                        {m.unread && <span style={{width:6,height:6,borderRadius:'50%',background:'var(--ic-burgundy)'}}/>}
                      </div>
                      <div style={{fontSize:11.5,color:'var(--ic-text-2)',fontFamily:'var(--ic-mono)',letterSpacing:'.06em',marginTop:1}}>{m.prop}</div>
                      <div style={{fontSize:13,color:'var(--ic-text)',marginTop:6,lineHeight:1.4}}>"{m.txt}"</div>
                      <div style={{fontSize:11,color:'var(--ic-text-3)',marginTop:4,fontFamily:'var(--ic-mono)'}}>{m.time}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>

          <div style={{marginTop:24}}>
            <div className="empty-cta">
              <div style={{flex:1}}>
                <h4 style={{margin:0,fontSize:15,fontWeight:600}}>Verificación premium pendiente</h4>
                <p style={{margin:'6px 0 0',fontSize:13,color:'var(--ic-text-2)'}}>Completá la verificación premium para obtener el badge ★ Premium y aparecer destacado en resultados.</p>
              </div>
              <button className="ic-btn ic-btn-gold">Empezar verificación →</button>

        </main>
      </div>
    </div>

}

ReactDOM.createRoot(document.getElementById('app')).render(<Dashboard/>);
window.addEventListener('load', () => mountTweaks({ showLogoVar:true, showHeroVar:false }));
