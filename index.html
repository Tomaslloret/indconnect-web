            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr'}}>
              {[
                { name:"Logística Sur SRL", ops:48, rating:4.9, t:"2h", v:true, p:true },
                { name:"Grupo Inmob. Pampa",ops:34, rating:4.8, t:"1h", v:true, p:true },

                { name:"M. Fernández — Independiente",ops:12, rating:4.4, t:"6h", v:true, p:false },
              ].map((s,i)=>(
                <div key={i} style={{padding:'24px 24px',borderRight:i%2===0?'1px solid var(--ic-line)':'',borderBottom:i<2?'1px solid var(--ic-line)':''}}>

function App() {
  const [t] = useIndTweaks();
  let Hero = HeroSplit;
  if (t.heroVar === "minimal") Hero = HeroMinimal;
  if (t.heroVar === "bigtype") Hero = HeroBigType;

  return (
    <div className="ic-page" data-screen-label="01 Landing">
      <Header active="home" logoVariant={t.logoVar}/>
      <Hero logoVar={t.logoVar}/>
      <Marquee/>
      <Categories/>
      <Featured/>
      <Differentials/>
      <ReputationShowcase/>
      <HowItWorks/>
      <Footer/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
